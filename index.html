<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VéloÉlec & Co - Comparateur de Vélos Électriques</title>
    <style>
        :root {
            --dark-blue: #111d2c;      /* Bleu nuit ultra sombre */
            --pink-accent: #d1125b;    /* Fuchsia/Magenta dynamique */
            --pink-hover: #b00b4a;
            --text-dark: #2c3e50;
            --text-muted: #64748b;
            --bg-light: #ffffff;       /* Fond blanc pur */
            --bg-card: #f8fafc;        /* Gris très léger pour les cartes */
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            --font-serif: 'Georgia', Cambria, "Times New Roman", Times, serif;
        }

        /* -------------------------------------------------------------------------
           NAV BAR / HEADER (Nettoyé du logo Les Voltés)
           ------------------------------------------------------------------------- */
        header {
            background-color: var(--bg-light);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark-blue);
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .logo-text span {
            color: var(--pink-accent);
        }

        .admin-link {
            background-color: transparent;
            color: var(--dark-blue);
            border: 1px solid var(--dark-blue);
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .admin-link:hover {
            background-color: var(--dark-blue);
            color: white;
        }

        /* -------------------------------------------------------------------------
           HERO SECTION (Bannière d'accueil)
           ------------------------------------------------------------------------- */
        .hero-section {
            background: linear-gradient(rgba(17, 29, 44, 0.85), rgba(17, 29, 44, 0.95)), 
                        url('https://images.unsplash.com/photo-1571068316341-2502974b73f5?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 90px 20px;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 42px;
            font-weight: bold;
            margin: 0 auto 20px auto;
            max-width: 800px;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .hero-btn {
            background-color: var(--pink-accent);
            color: white;
            padding: 14px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .hero-btn:hover {
            background-color: var(--pink-hover);
        }

        /* -------------------------------------------------------------------------
           SECTION FILTRES
           ------------------------------------------------------------------------- */
        .search-container {
            max-width: 900px;
            margin: -40px auto 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .filter-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--dark-blue);
        }

        .filter-group input[type="text"] {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group input[type="text"]:focus {
            border-color: var(--pink-accent);
        }

        /* -------------------------------------------------------------------------
           SECTION CONTENU & GRILLE DES VÉLOS
           ------------------------------------------------------------------------- */
        .section-title {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 32px;
            color: var(--dark-blue);
            margin: 50px 0 30px 0;
        }

        main {
            max-width: 1140px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
        }

        .velo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .velo-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
        }

        .velo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.05);
        }

        .image-container {
            width: 100%;
            height: 230px;
            background-color: #f1f5f9;
            overflow: hidden;
            position: relative;
        }

        .velo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .velo-badge-price {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: var(--dark-blue);
            color: white;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
        }

        .velo-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .velo-name {
            font-family: var(--font-serif);
            font-size: 22px;
            color: var(--dark-blue);
            margin: 0 0 15px 0;
        }

        /* Spécifications techniques sous forme de lignes propres */
        .tech-specs {
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-dark);
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        .spec-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .spec-label {
            color: var(--text-muted);
        }

        .spec-value {
            font-weight: 600;
        }

        /* -------------------------------------------------------------------------
           RESTAURATON ET STYLE DES PUCES ET LISTES (Fix Descriptions)
           ------------------------------------------------------------------------- */
        .velo-desc {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dark);
            margin: 0 0 25px 0;
            flex-grow: 1;
        }

        /* Gestion stylisée si tes descriptions contiennent des listes HTML brutes (ul/li) */
        .velo-desc ul {
            margin: 10px 0;
            padding-left: 20px;
            list-style-type: none; /* Nettoyage des puces navigateurs par défaut */
        }

        .velo-desc li {
            position: relative;
            margin-bottom: 6px;
            padding-left: 15px;
        }

        /* Ajout d'une puce personnalisée colorée en rose fuchsia devant chaque élément */
        .velo-desc li::before {
            content: "•";
            color: var(--pink-accent);
            font-weight: bold;
            font-size: 18px;
            position: absolute;
            left: 0;
            top: -2px;
        }

        .action-edit-btn {
            text-align: center;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .action-edit-btn:hover {
            border-color: var(--pink-accent);
            color: var(--pink-accent);
        }

        #loader {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 20px;
            padding: 60px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="/" class="logo-text">VéloÉlec<span>&Co</span></a>
            <a href="/admin.html" class="admin-link">Espace Admin</a>
        </div>
    </header>

    <section class="hero-section">
        <h1 class="hero-title">Trouvez le vélo électrique fait pour vous, sans vous tromper</h1>
        <p class="hero-subtitle">Avis clairs, comparatifs fiables, conseils pratiques pour choisir sereinement.</p>
        <button class="hero-btn" onclick="document.getElementById('search-input').focus();">Trouver mon VAE idéal</button>
    </section>

    <section class="search-container">
        <div class="filter-box">
            <div class="filter-group">
                <label for="search-input">Recherche par mot-clé</label>
                <input type="text" id="search-input" placeholder="Ex: Rockrider, Moteur Bosch..." oninput="filtrerCatalogue()">
            </div>
            <div class="filter-group">
                <label for="price-range">Budget Maximal : <span id="price-val">6000</span>€</label>
                <div style="display:flex; align-items:center; height:100%;">
                    <input type="range" id="price-range" min="0" max="6000" step="100" value="6000" style="width:100%; accent-color: var(--pink-accent);" oninput="filtrerCatalogue()">
                </div>
            </div>
        </div>
    </section>

    <h2 class="section-title">Nos VAE du quotidien préférés</h2>
    
    <main>
        <div id="loader">Chargement sécurisé des modèles de vélos...</div>
        <div class="velo-grid" id="velo-container"></div>
    </main>

    <div id="seo-ia-structured-data"></div>

    <script>
        let listeLocaleVelos = [];

        async function initialiserCatalogue() {
            try {
                const response = await fetch('/api/velos');
                listeLocaleVelos = await response.json();
                document.getElementById('loader').style.display = 'none';
                genererCartesHTML(listeLocaleVelos);
            } catch (err) {
                document.getElementById('loader').innerText = "Erreur de synchronisation avec Supabase.";
            }
        }

        // Fonction pour formater le texte brut et recréer de vraies puces HTML si l'utilisateur met des tirets ou des slashes
        function formaterDescriptionEnPuces(texte) {
            if (!texte) return 'Analyse en cours d\'écriture...';
            
            // Si le texte contient déjà des balises HTML, on le laisse tel quel
            if (texte.includes('<li>') || texte.includes('<ul>')) return texte;

            // Découpage automatique si présence de doubles slashes (//), tirets (-) ou retours à la ligne
            let elements = [];
            if (texte.includes('//')) {
                elements = texte.split('//');
            } else if (texte.includes('\n')) {
                elements = texte.split('\n');
            } else {
                return texte; // Retourne le texte brut s'il n'y a pas de séparateur
            }

            // Génération d'une liste propre
            let htmlListe = '<ul>';
            elements.forEach(el => {
                let texteNettoye = el.replace(/^[-\s+*/]+/, '').trim(); // Enlève les vieux tirets ou espaces résiduels
                if (texteNettoye !== "") {
                    htmlListe += `<li>${texteNettoye}</li>`;
                }
            });
            htmlListe += '</ul>';
            return htmlListe;
        }

        function genererCartesHTML(liste) {
            const grid = document.getElementById('velo-container');
            const seoContainer = document.getElementById('seo-ia-structured-data');
            
            grid.innerHTML = "";
            seoContainer.innerHTML = "";

            if (liste.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--text-muted);'>Aucun modèle disponible pour ces critères.</p>";
                return;
            }

            liste.forEach(velo => {
                const imageSrc = (velo.image_url && velo.image_url.trim() !== "") ? velo.image_url : "https://images.unsplash.com/photo-1532298229144-0ec0c57515c7?auto=format&fit=crop&w=600&q=80";
                
                // Traitement des descriptions pour générer les puces personnalisées
                const descriptionFormatee = formaterDescriptionEnPuces(velo.description_ia);

                const card = document.createElement('div');
                card.className = 'velo-card';
                card.innerHTML = `
                    <div class="image-container">
                        <img src="${imageSrc}" class="velo-img" alt="${velo.nom}">
                        <div class="velo-badge-price">${velo.prix} €</div>
                    </div>
                    <div class="velo-body">
                        <h3 class="velo-name">${velo.nom}</h3>
                        <div class="tech-specs">
                            <div class="spec-row">
                                <span class="spec-label">Moteur</span>
                                <span class="spec-value">${velo.moteur || 'Standard'}</span>
                            </div>
                            <div class="spec-row">
                                <span class="spec-label">Batterie</span>
                                <span class="spec-value">${velo.batterie || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="velo-desc">${descriptionFormatee}</div>
                        <a href="/admin.html?id=${encodeURIComponent(velo.identifiant)}&nom=${encodeURIComponent(velo.nom)}&prix=${velo.prix}&moteur=${encodeURIComponent(velo.moteur || '')}&batterie=${encodeURIComponent(velo.batterie || '')}&description_ia=${encodeURIComponent(velo.description_ia || '')}&image_url=${encodeURIComponent(velo.image_url || '')}" class="action-edit-btn">Modifier la fiche</a>
                    </div>
                `;
                grid.appendChild(card);

                // Données Structurées pour Gemini/ChatGPT
                const scriptIA = document.createElement('script');
                scriptIA.type = 'application/ld+json';
                scriptIA.text = JSON.stringify({
                    "@context": "https://schema.org/",
                    "@type": "Product",
                    "name": velo.nom,
                    "image": velo.image_url || "",
                    "description": velo.description_ia || "",
                    "offers": {
                        "@type": "Offer",
                        "priceCurrency": "EUR",
                        "price": velo.prix.toString()
                    }
                });
                seoContainer.appendChild(scriptIA);
            });
        }

        function filtrerCatalogue() {
            const texte = document.getElementById('search-input').value.toLowerCase();
            const prixMax = parseInt(document.getElementById('price-range').value);
            document.getElementById('price-val').innerText = prixMax;

            const resultat = listeLocaleVelos.filter(velo => {
                const matchTexte = velo.nom.toLowerCase().includes(texte) || (velo.moteur && velo.moteur.toLowerCase().includes(texte));
                const matchPrix = velo.prix <= prixMax;
                return matchTexte && matchPrix;
            });

            genererCartesHTML(resultat);
        }

        window.onload = initialiserCatalogue;
    </script>
</body>
</html>
