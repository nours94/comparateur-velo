<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin - Étape 1</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; color: #334155; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #d1125b; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #status { padding: 10px; margin-bottom: 15px; display: none; border-radius: 4px; font-weight: bold; }
        .info-sync { background: #e0f2fe; color: #0369a1; }
    </style>
</head>
<body>

<div class="box">
    <h2>Gestion du catalogue - Étape 1 (Identité)</h2>
    <div id="status"></div>

    <form id="form-velo">
        <div class="group">
            <label>Jeton de sécurité (ROBOT_TOKEN)</label>
            <input type="text" id="robot_token_form" required>
        </div>

        <div class="group">
            <label>Mode opératoire</label>
            <select id="action-mode" onchange="basculerMode()">
                <option value="ajout">Ajouter un nouveau vélo</option>
                <option value="modification">Modifier un vélo existant (Auto-remplissage)</option>
            </select>
        </div>

        <div class="group">
            <label>ID unique du vélo</label>
            <input type="text" id="id" required placeholder="ex: nakamura-e-crossover" onchange="chargerDonneesExistantes()">
        </div>

        <div class="group">
            <label>Nom du vélo</label>
            <input type="text" id="nom" required>
        </div>

        <div class="group" style="background: #fdf2f8; padding: 10px; border: 1px solid #fbcfe8; border-radius: 4px;">
            <label style="color: #d1125b;">[NOUVEAU] Marque</label>
            <input type="text" id="marque" placeholder="ex: Nakamura">
            <label style="color: #d1125b; margin-top:5px;">[NOUVEAU] Modèle</label>
            <input type="text" id="modele" placeholder="ex: E-Crossover XV">
        </div>

        <div class="group">
            <label>Prix (€)</label>
            <input type="number" id="prix" value="0">
        </div>

        <div class="group">
            <label>Infos Moteur</label>
            <input type="text" id="moteur">
        </div>

        <div class="group">
            <label>Infos Batterie</label>
            <input type="text" id="batterie">
        </div>

        <div class="group">
            <label>Description IA</label>
            <textarea id="description_ia"></textarea>
        </div>

        <div class="group">
            <label>URL Image</label>
            <input type="text" id="image_url">
        </div>

        <button type="submit">Envoyer les données à Supabase</button>
    </form>
</div>

<script>
    function basculerMode() {
        const mode = document.getElementById('action-mode').value;
        document.getElementById('id').style.background = mode === 'modification' ? '#e2e8f0' : '#ffffff';
        if(mode === 'modification') chargerDonneesExistantes();
    }

    // Pré-remplissage magique pour ne plus avoir à tout retaper !
    async function chargerDonneesExistantes() {
        const id = document.getElementById('id').value.trim();
        const mode = document.getElementById('action-mode').value;
        if (!id || mode !== 'modification') return;

        const status = document.getElementById('status');
        status.className = "info-sync";
        status.innerText = "🔄 Récupération de la fiche actuelle dans Supabase...";
        status.style.display = "block";

        try {
            const res = await fetch(`/api/velos/${encodeURIComponent(id)}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('nom').value = data.nom || '';
                document.getElementById('prix').value = data.prix || 0;
                document.getElementById('moteur').value = data.moteur || '';
                document.getElementById('batterie').value = data.batterie || '';
                document.getElementById('description_ia').value = data.description_ia || '';
                document.getElementById('image_url').value = data.image_url || '';
                document.getElementById('marque').value = data.marque || '';
                document.getElementById('modele').value = data.modele || '';
                status.innerText = "✅ Données actuelles chargées. Modifie uniquement ce que tu veux !";
            } else {
                status.innerText = "ℹ️ Aucun vélo trouvé avec cet ID en base de données.";
            }
        } catch(e) {
            status.innerText = "❌ Erreur de connexion avec l'API.";
        }
    }

    document.getElementById('form-velo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const mode = document.getElementById('action-mode').value;
        const endpoint = mode === 'ajout' ? '/api/ajouter-velo' : '/api/modifier-velo';

        const params = new URLSearchParams();
        params.append('id', document.getElementById('id').value);
        params.append('nom', document.getElementById('nom').value);
        params.append('prix', document.getElementById('prix').value);
        params.append('moteur', document.getElementById('moteur').value);
        params.append('batterie', document.getElementById('batterie').value);
        params.append('description_ia', document.getElementById('description_ia').value);
        params.append('image_url', document.getElementById('image_url').value);
        params.append('marque', document.getElementById('marque').value);
        params.append('modele', document.getElementById('modele').value);
        params.append('robot_token_form', document.getElementById('robot_token_form').value);

        const res = await fetch(endpoint, { method: 'POST', body: params });
        const resData = await res.json();
        
        const status = document.getElementById('status');
        status.style.display = "block";
        if(res.ok) {
            status.style.background = "#dcfce7"; status.style.color = "#166534";
            status.innerText = "🎉 " + resData.message;
            if(mode === 'ajout') document.getElementById('form-velo').reset();
        } else {
            status.style.background = "#fee2e2"; status.style.color = "#991b1b";
            status.innerText = "❌ Erreur : " + resData.detail;
        }
    });
</script>
</body>
</html>
