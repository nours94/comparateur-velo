<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Comparateur Vélo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .info-note {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .btn-submit {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #2c3e50;
        }
        #message-retour {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1 id="form-title">➕ Ajouter un nouveau vélo</h1>
    
    <form id="velo-form" onsubmit="envoyerFormulaire(event)">
        
        <div class="form-group">
            <label for="id">Identifiant Unique (ID) :</label>
            <input type="text" id="id" name="id" placeholder="ex: specialized-turbo-creo" required>
            <div id="id-note" class="info-note">Cet identifiant sert de clé primaire. Il ne doit pas contenir d'espaces (utilisez des tirets).</div>
        </div>

        <div class="form-group">
            <label for="nom">Nom du Vélo :</label>
            <input type="text" id="nom" name="nom" placeholder="ex: Turbo Creo 2 Comp" required>
        </div>

        <div class="form-group">
            <label for="prix">Prix (€) :</label>
            <input type="number" id="prix" name="prix" placeholder="ex: 6000" min="0" required>
        </div>

        <div class="form-group">
            <label for="moteur">Modèle du Moteur :</label>
            <input type="text" id="moteur" name="moteur" placeholder="ex: Specialized SL 1.2, 50 Nm">
        </div>

        <div class="form-group">
            <label for="batterie">Capacité Batterie :</label>
            <input type="text" id="batterie" name="batterie" placeholder="ex: 320 Wh">
        </div>

        <div class="form-group">
            <label for="description_ia">Analyse & Description (IA) :</label>
            <textarea id="description_ia" name="description_ia" placeholder="Points forts, autonomie estimée..."></textarea>
        </div>

        <div class="form-group">
            <label for="image_url">Lien de l'image (URL) :</label>
            <input type="text" id="image_url" name="image_url" placeholder="https://exemple.com/image.jpg">
        </div>

        <div class="form-group">
            <label for="robot_token_form">Clé Secrète de Sécurité (ROBOT_TOKEN) :</label>
            <input type="text" id="robot_token_form" name="robot_token_form" placeholder="Entrez le token configuré" required>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">🚀 Ajouter au catalogue</button>
    </form>

    <div id="message-retour"></div>

    <a href="/" class="back-link">⬅️ Retourner à l'accueil du comparateur</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const idInput = document.getElementById('id');
    const idNote = document.getElementById('id-note');

    // Détermination de l'endpoint cible par défaut
    let endpointCible = "/api/ajouter-velo";

    if (urlParams.has('id')) {
        // Mode Modification activé
        endpointCible = "/api/modifier-velo";
        title.innerHTML = "⚙️ Modifier le vélo existant";
        submitBtn.innerHTML = "💾 Sauvegarder les modifications";
        submitBtn.style.backgroundColor = '#e67e22';
        
        // On remplit et on passe en readonly total
        idInput.value = urlParams.get('id');
        idInput.readOnly = true;
        idInput.style.backgroundColor = '#e8ecef';
        idInput.style.cursor = 'not-allowed';
        
        idNote.innerHTML = "🔒 Cet ID est verrouillé pour mettre à jour la bonne fiche dans la base de données.";
        idNote.style.color = '#e67e22';
        
        // Pré-remplissage automatique des données depuis les paramètres URL
        if(urlParams.has('nom')) document.getElementById('nom').value = urlParams.get('nom');
        if(urlParams.has('prix')) document.getElementById('prix').value = urlParams.get('prix');
        if(urlParams.has('moteur')) document.getElementById('moteur').value = urlParams.get('moteur');
        if(urlParams.has('batterie')) document.getElementById('batterie').value = urlParams.get('batterie');
        if(urlParams.has('description_ia')) document.getElementById('description_ia').value = urlParams.get('description_ia');
        if(urlParams.has('image_url')) document.getElementById('image_url').value = urlParams.get('image_url');
    }

    // Gestion de l'envoi via JavaScript (Fetch) pour s'assurer que TOUS les champs partent
    async function envoyerFormulaire(event) {
        event.preventDefault(); // Bloque le rechargement brut de la page HTML
        
        const msgDiv = document.getElementById('message-retour');
        msgDiv.style.display = 'none';

        // Capturer les données en ignorant les contraintes de blocage du navigateur
        const formData = new FormData();
        formData.append('id', idInput.value); // On force la récupération de la valeur de l'ID ici !
        formData.append('nom', document.getElementById('nom').value);
        formData.append('prix', document.getElementById('prix').value);
        formData.append('moteur', document.getElementById('moteur').value);
        formData.append('batterie', document.getElementById('batterie').value);
        formData.append('description_ia', document.getElementById('description_ia').value);
        formData.append('image_url', document.getElementById('image_url').value);
        formData.append('robot_token_form', document.getElementById('robot_token_form').value);

        try {
            const response = await fetch(endpointCible, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                msgDiv.style.backgroundColor = '#d4edda';
                msgDiv.style.color = '#155724';
                msgDiv.innerHTML = data.message || "Opération réussie ! 🎉";
                msgDiv.style.display = 'block';
                
                // Si c'était un ajout, on vide le formulaire (sauf le token)
                if (endpointCible === "/api/ajouter-velo") {
                    document.getElementById('id').value = '';
                    document.getElementById('nom').value = '';
                    document.getElementById('prix').value = '';
                    document.getElementById('moteur').value = '';
                    document.getElementById('batterie').value = '';
                    document.getElementById('description_ia').value = '';
                    document.getElementById('image_url').value = '';
                }
            } else {
                // Gestion fine des erreurs FastAPI reçues
                msgDiv.style.backgroundColor = '#f8d7da';
                msgDiv.style.color = '#721c24';
                
                if (data.detail && typeof data.detail === 'object') {
                    msgDiv.innerHTML = "❌ Erreur de validation : " + JSON.stringify(data.detail);
                } else {
                    msgDiv.innerHTML = "❌ Erreur : " + (data.detail || "Une erreur est survenue.");
                }
                msgDiv.style.display = 'block';
            }
        } catch (error) {
            msgDiv.style.backgroundColor = '#f8d7da';
            msgDiv.style.color = '#721c24';
            msgDiv.innerHTML = "❌ Impossible de joindre le serveur de déploiement.";
            msgDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
