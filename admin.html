<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VéloÉlec & Co - Console d'Administration Supabase</title>
    <style>
        :root {
            --dark-blue: #111d2c;
            --pink-accent: #d1125b;
            --pink-hover: #b00b4a;
            --text-dark: #2c3e50;
            --bg-light: #f8fafc;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--dark-blue);
            text-decoration: none;
        }
        .logo span { color: var(--pink-accent); }

        .back-btn {
            color: var(--dark-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            color: var(--dark-blue);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--dark-blue);
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--pink-accent);
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            background-color: var(--pink-accent);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: var(--pink-hover); }

        #message-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }

        .success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="/" class="logo">VéloÉlec<span>&Co</span> / Admin</a>
            <a href="/" class="back-btn">← Retour au site</a>
        </div>
    </header>

    <div class="container">
        <h1 id="form-title">Ajouter un nouveau vélo</h1>
        <p class="subtitle">Remplissez les champs ci-dessous pour mettre à jour la table Supabase en temps réel.</p>

        <form id="velo-form">
            <!-- Sécurité Token -->
            <div class="form-group">
                <label for="robot_token_form">Clé de Sécurité Admin (ROBOT_TOKEN)</label>
                <input type="text" id="robot_token_form" required placeholder="Entrez le token secret configuré sur Render">
            </div>

            <!-- ID et Nom -->
            <div class="row">
                <div class="form-group">
                    <label for="id">Identifiant Unique (ID)</label>
                    <input type="text" id="id" required placeholder="ex: rockrider-e-st100">
                </div>
                <div class="form-group">
                    <label for="nom">Nom du Vélo</label>
                    <input type="text" id="nom" required placeholder="ex: Decathlon Rockrider E-ST 100">
                </div>
            </div>

            <!-- Prix et Image -->
            <div class="row">
                <div class="form-group">
                    <label for="prix">Prix (€)</label>
                    <input type="number" id="prix" value="0" required>
                </div>
                <div class="form-group">
                    <label for="image_url">URL de l'image (Lien internet)</label>
                    <input type="text" id="image_url" placeholder="https://images.unsplash.com/... ou blanc">
                </div>
            </div>

            <!-- Moteur et Batterie -->
            <div class="row">
                <div class="form-group">
                    <label for="moteur">Caractéristiques Moteur</label>
                    <input type="text" id="moteur" placeholder="ex: Moteur central Brose Drive T 70Nm">
                </div>
                <div class="form-group">
                    <label for="batterie">Capacité Batterie</label>
                    <input type="text" id="batterie" placeholder="ex: 500 Wh">
                </div>
            </div>

            <!-- Description / Analyse IA -->
            <div class="form-group">
                <label for="description_ia">Analyse de l'expert IA (Une ligne par puce ou séparé par //)</label>
                <textarea id="description_ia" placeholder="Idéal pour débuter le VTT électrique&#10;Un excellent rapport qualité/prix urbain"></textarea>
            </div>

            <!-- Choix Action dynamique -->
            <div class="form-group">
                <label for="action-mode">Action à réaliser</label>
                <select id="action-mode" onchange="changerModeFormulaire()">
                    <option value="ajout">Créer une nouvelle entrée (Ajout)</option>
                    <option value="modification">Mettre à jour un vélo existant (Modification)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit" id="btn-text">Enregistrer dans Supabase</button>
        </form>

        <div id="message-box"></div>
    </div>

    <script>
        // Détection automatique si on passe un ID dans l'URL (ex: admin.html?id=rockrider)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            if (idParam) {
                document.getElementById('id').value = idParam;
                document.getElementById('action-mode').value = 'modification';
                changerModeFormulaire();
            }
        };

        function changerModeFormulaire() {
            const mode = document.getElementById('action-mode').value;
            const titre = document.getElementById('form-title');
            const bouton = document.getElementById('btn-text');
            const inputId = document.getElementById('id');

            if (mode === 'modification') {
                titre.innerText = "Modifier un vélo existant";
                bouton.innerText = "Enregistrer les modifications";
                inputId.style.backgroundColor = "#f1f5f9";
                alert("Rappel : Pour une modification, l'ID saisi doit être strictement identique à celui présent dans Supabase.");
            } else {
                titre.innerText = "Ajouter un nouveau vélo";
                bouton.innerText = "Enregistrer dans Supabase";
                inputId.style.backgroundColor = "#ffffff";
            }
        }

        document.getElementById('velo-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('message-box');
            msgBox.style.display = 'none';

            const mode = document.getElementById('action-mode').value;
            const endpoint = mode === 'ajout' ? '/api/ajouter-velo' : '/api/modifier-velo';

            // Préparation des données au format Form (URL Encoded) requis par l'API
            const formData = new URLSearchParams();
            formData.append('id', document.getElementById('id').value);
            formData.append('nom', document.getElementById('nom').value);
            formData.append('prix', document.getElementById('prix').value);
            formData.append('image_url', document.getElementById('image_url').value);
            formData.append('moteur', document.getElementById('moteur').value);
            formData.append('batterie', document.getElementById('batterie').value);
            formData.append('description_ia', document.getElementById('description_ia').value);
            formData.append('robot_token_form', document.getElementById('robot_token_form').value);

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = "success";
                    msgBox.innerText = "🎉 " + data.message;
                    msgBox.style.display = 'block';
                    if(mode === 'ajout') document.getElementById('velo-form').reset();
                } else {
                    msgBox.className = "error";
                    msgBox.innerText = "❌ Erreur : " + (data.detail || "Une erreur est survenue.");
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                msgBox.className = "error";
                msgBox.innerText = "❌ Impossible de joindre le serveur FastAPI.";
                msgBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
