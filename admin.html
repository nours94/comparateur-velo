<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Comparateur Vélo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .info-note {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .btn-submit {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1 id="form-title">➕ Ajouter un nouveau vélo</h1>
    
    <form id="velo-form" method="POST" action="/api/ajouter-velo">
        
        <div class="form-group">
            <label for="id">Identifiant Unique (ID) :</label>
            <input type="text" id="id" name="id" placeholder="ex: specialized-turbo-creo" required>
            <div id="id-note" class="info-note">Cet identifiant sert de clé primaire dans Supabase. Il ne doit pas contenir d'espaces (utilisez des tirets).</div>
        </div>

        <div class="form-group">
            <label for="nom">Nom du Vélo :</label>
            <input type="text" id="nom" name="nom" placeholder="ex: Turbo Creo 2 Comp" required>
        </div>

        <div class="form-group">
            <label for="prix">Prix (€) :</label>
            <input type="number" id="prix" name="prix" placeholder="ex: 6000" min="0" required>
        </div>

        <div class="form-group">
            <label for="moteur">Modèle du Moteur :</label>
            <input type="text" id="moteur" name="moteur" placeholder="ex: Specialized SL 1.2, 50 Nm">
        </div>

        <div class="form-group">
            <label for="batterie">Capacité Batterie :</label>
            <input type="text" id="batterie" name="batterie" placeholder="ex: 320 Wh">
        </div>

        <div class="form-group">
            <label for="description_ia">Analyse & Description (IA) :</label>
            <textarea id="description_ia" name="description_ia" placeholder="Points forts, autonomie estimée, comportement routier..."></textarea>
        </div>

        <div class="form-group">
            <label for="image_url">Lien de l'image (URL) :</label>
            <input type="text" id="image_url" name="image_url" placeholder="https://exemple.com/image.jpg">
        </div>

        <div class="form-group">
            <label for="robot_token_form">Clé Secrète de Sécurité (ROBOT_TOKEN) :</label>
            <input type="text" id="robot_token_form" name="robot_token_form" placeholder="Entrez le token configuré pour valider l'accès" required>
            <div class="info-note">Requis pour authentifier que vous êtes bien l'administrateur du site.</div>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">🚀 Ajouter au catalogue</button>
    </form>

    <a href="/" class="back-link">⬅️ Retourner à l'accueil du comparateur</a>
</div>

<script>
    // Détection automatique du mode (Ajout ou Modification) selon l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const form = document.getElementById('velo-form');
    const title = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const idInput = document.getElementById('id');
    const idNote = document.getElementById('id-note');

    if (urlParams.has('id')) {
        // Mode Modification détecté
        form.action = "/api/modifier-velo";
        title.innerHTML = "⚙️ Modifier le vélo existant";
        submitBtn.innerHTML = "💾 Sauvegarder les modifications";
        submitBtn.style.backgroundColor = '#e67e22';
        
        // Remplissage et verrouillage de l'ID en lecture seule
        idInput.value = urlParams.get('id');
        idInput.setAttribute('readonly', 'true');
        idInput.style.backgroundColor = '#e8ecef';
        idInput.style.cursor = 'not-allowed';
        
        idNote.innerHTML = "🔒 Cet ID est verrouillé en lecture seule pour assurer la mise à jour de la bonne fiche Supabase.";
        idNote.style.color = '#e67e22';
        
        // Pré-remplissage des autres champs avec les valeurs actuelles reçues dans l'URL
        if(urlParams.has('nom')) document.getElementById('nom').value = urlParams.get('nom');
        if(urlParams.has('prix')) document.getElementById('prix').value = urlParams.get('prix');
        if(urlParams.has('moteur')) document.getElementById('moteur').value = urlParams.get('moteur');
        if(urlParams.has('batterie')) document.getElementById('batterie').value = urlParams.get('batterie');
        if(urlParams.has('description_ia')) document.getElementById('description_ia').value = urlParams.get('description_ia');
        if(urlParams.has('image_url')) document.getElementById('image_url').value = urlParams.get('image_url');
    }
</script>

</body>
</html>
