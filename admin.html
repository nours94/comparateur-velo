<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VéloÉlec & Co - Administration</title>
    <style>
        :root {
            --dark-blue: #111d2c;
            --pink-accent: #d1125b;
            --pink-hover: #b00b4a;
            --text-dark: #2c3e50;
            --bg-light: #f8fafc;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--dark-blue);
            text-decoration: none;
        }
        .logo span { color: var(--pink-accent); }

        .back-btn {
            color: var(--dark-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 { font-size: 24px; color: var(--dark-blue); margin: 0 0 30px 0; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--dark-blue);
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="password"], input[type="number"], textarea, select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-dark);
            background-color: var(--bg-light);
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--pink-accent);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(209, 18, 91, 0.1);
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .btn-submit {
            background-color: var(--pink-accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: var(--pink-hover);
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .pink-box { background: #fdf2f8; padding: 15px; border: 1px solid #fbcfe8; border-radius: 6px; grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="/" class="logo">VéloÉlec<span>&Co</span></a>
            <a href="/" class="back-btn">← Retour au site</a>
        </div>
    </header>

    <div class="container">
        <h1>Console d'administration</h1>
        
        <form id="veloForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="robot_token_form">Clé Secrète de Sécurité (ROBOT_TOKEN)</label>
                    <input type="password" id="robot_token_form" required placeholder="Entrez le mot de passe admin">
                </div>

                <div class="form-group">
                    <label for="id">Identifiant Unique (ID)</label>
                    <input type="text" id="id" required placeholder="ex: rockrider-e-st-100">
                </div>

                <div class="form-group">
                    <label for="nom_velo">Nom du Vélo</label>
                    <input type="text" id="nom_velo" required>
                </div>

                <div class="pink-box">
                    <div class="form-group">
                        <label for="marque" style="color: var(--pink-accent);">[NOUVEAU] Marque</label>
                        <input type="text" id="marque" placeholder="ex: Nakamura">
                    </div>
                    <div class="form-group">
                        <label for="modele" style="color: var(--pink-accent);">[NOUVEAU] Modèle</label>
                        <input type="text" id="modele" placeholder="ex: E-Crossover XV">
                    </div>
                </div>

                <div class="form-group">
                    <label for="prix">Prix (€)</label>
                    <input type="number" id="prix" required>
                </div>

                <div class="form-group">
                    <label for="image_url">URL de l'Image</label>
                    <input type="text" id="image_url">
                </div>

                <div class="form-group">
                    <label for="caracteristiques_moteur">Caractéristiques Moteur</label>
                    <input type="text" id="caracteristiques_moteur">
                </div>

                <div class="form-group">
                    <label for="capacite_batterie">Capacité Batterie</label>
                    <input type="text" id="capacite_batterie">
                </div>

                <div class="form-group full-width">
                    <label for="description_ia">Analyse de l'Expert IA</label>
                    <textarea id="description_ia"></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="action-mode">Action à réaliser</label>
                    <select id="action-mode">
                        <option value="ajout">Ajouter un nouveau vélo</option>
                        <option value="modification">Mettre à jour un vélo existant (Modification)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">Enregistrer les modifications</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // RÉCUPÉRATION DIRECTE DEPUIS L'API POUR ÉVITER LES PROBLÈMES D'URL
        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const idVelo = params.get('id');
            
            if (idVelo) {
                document.getElementById('action-mode').value = 'modification';
                document.getElementById('id').value = idVelo;
                
                // Griser l'ID
                document.getElementById('id').style.backgroundColor = '#e2e8f0';
                document.getElementById('id').readOnly = true;

                const messageDiv = document.getElementById('message');
                messageDiv.style.display = 'block';
                messageDiv.className = 'success';
                messageDiv.style.backgroundColor = '#e0f2fe';
                messageDiv.style.color = '#0369a1';
                messageDiv.innerText = '🔄 Récupération des données en temps réel depuis Supabase...';

                try {
                    // On interroge l'API pour récupérer la fiche fraîche
                    const response = await fetch(`/api/velos/${encodeURIComponent(idVelo)}`);
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Remplissage de tes champs d'origine
                        document.getElementById('nom_velo').value = data.nom || '';
                        document.getElementById('prix').value = data.prix || 0;
                        document.getElementById('image_url').value = data.image_url || '';
                        document.getElementById('caracteristiques_moteur').value = data.moteur || '';
                        document.getElementById('capacite_batterie').value = data.batterie || '';
                        document.getElementById('description_ia').value = data.description_ia || '';
                        document.getElementById('marque').value = data.marque || '';
                        document.getElementById('modele').value = data.modele || '';
                        
                        messageDiv.style.display = 'none';
                    } else {
                        messageDiv.className = 'error';
                        messageDiv.innerText = '⚠️ Impossible de trouver ce vélo dans la base.';
                    }
                } catch (error) {
                    messageDiv.className = 'error';
                    messageDiv.innerText = '❌ Erreur lors du chargement des données.';
                }
            }
        });

        // Envoi des données vers FastAPI
        document.getElementById('veloForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mode = document.getElementById('action-mode').value;
            const endpoint = mode === 'ajout' ? '/api/ajouter-velo' : '/api/modifier-velo';
            
            const formData = new URLSearchParams();
            formData.append('id', document.getElementById('id').value);
            formData.append('nom', document.getElementById('nom_velo').value); // Transmet bien à l'API
            formData.append('prix', document.getElementById('prix').value);
            formData.append('moteur', document.getElementById('caracteristiques_moteur').value); // Transmet bien à l'API
            formData.append('batterie', document.getElementById('capacite_batterie').value); // Transmet bien à l'API
            formData.append('description_ia', document.getElementById('description_ia').value);
            formData.append('image_url', document.getElementById('image_url').value);
            formData.append('marque', document.getElementById('marque').value);
            formData.append('modele', document.getElementById('modele').value);
            formData.append('robot_token_form', document.getElementById('robot_token_form').value);

            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.className = '';
            messageDiv.innerText = 'Envoi en cours vers Supabase...';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'success';
                    messageDiv.innerText = '🎉 ' + data.message;
                } else {
                    messageDiv.className = 'error';
                    messageDiv.innerText = '❌ Erreur : ' + (data.detail || 'Une erreur est survenue.');
                }
            } catch (error) {
                messageDiv.className = 'error';
                messageDiv.innerText = '❌ Impossible de contacter le serveur de base de données.';
            }
        });
    </script>
</body>
</html>
