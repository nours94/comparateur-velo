<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin - Étape 1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; color: #334155; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; text-transform: uppercase; color: #111d2c; }
        input, select, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 14px; background: #d1125b; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #b00b4a; }
        #status { padding: 12px; margin-bottom: 15px; display: none; border-radius: 4px; font-weight: bold; }
        .pink-box { background: #fdf2f8; padding: 15px; border: 1px solid #fbcfe8; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Gestion du catalogue - Secteur Identité</h2>
    <div id="status"></div>

    <form id="form-velo">
        <div class="group">
            <label>Jeton de sécurité (ROBOT_TOKEN)</label>
            <input type="text" id="robot_token_form" value="super_secret_token_123" required>
        </div>

        <div class="group">
            <label>Action à réaliser</label>
            <select id="action-mode">
                <option value="ajout">Ajouter un nouveau vélo</option>
                <option value="modification">Mettre à jour un vélo existant (Modification)</option>
            </select>
        </div>

        <div class="group">
            <label>Identifiant unique (ID)</label>
            <input type="text" id="id" required placeholder="ex: nakamura-e-crossover">
        </div>

        <div class="group">
            <label>Nom du vélo</label>
            <input type="text" id="nom" required>
        </div>

        <div class="group pink-box">
            <label style="color: #d1125b;">[NOUVEAU] Marque</label>
            <input type="text" id="marque" placeholder="ex: Nakamura">
            <label style="color: #d1125b; margin-top: 10px;">[NOUVEAU] Modèle</label>
            <input type="text" id="modele" placeholder="ex: E-Crossover XV">
        </div>

        <div class="group">
            <label>Prix (€)</label>
            <input type="number" id="prix" value="0">
        </div>

        <div class="group">
            <label>Caractéristiques Moteur</label>
            <input type="text" id="moteur">
        </div>

        <div class="group">
            <label>Capacité Batterie</label>
            <input type="text" id="batterie">
        </div>

        <div class="group">
            <label>Analyse de l'expert IA</label>
            <textarea id="description_ia"></textarea>
        </div>

        <div class="group">
            <label>URL de l'image (Lien internet)</label>
            <input type="text" id="image_url">
        </div>

        <button type="submit">Enregistrer les modifications</button>
    </form>
</div>

<script>
    // FONCTION MAGIQUE : Lit l'URL et pré-remplit les cases au chargement de la page
    function autoRemplirDepuisURL() {
        const params = new URLSearchParams(window.location.search);
        
        // Si on a au moins un ID dans l'URL, c'est qu'on vient du bouton "Modifier"
        if (params.has('id')) {
            document.getElementById('action-mode').value = 'modification';
            document.getElementById('id').value = params.get('id') || '';
            document.getElementById('nom').value = params.get('nom') || '';
            document.getElementById('prix').value = params.get('prix') || '0';
            document.getElementById('moteur').value = params.get('moteur') || '';
            document.getElementById('batterie').value = params.get('batterie') || '';
            document.getElementById('description_ia').value = params.get('description_ia') || '';
            document.getElementById('image_url').value = params.get('image_url') || '';
            document.getElementById('marque').value = params.get('marque') || '';
            document.getElementById('modele').value = params.get('modele') || '';
            
            // Verrouiller l'ID car on ne doit pas le changer pendant une modification
            document.getElementById('id').style.background = '#e2e8f0';
            document.getElementById('id').readOnly = true;
        }
    }

    // Exécuter le remplissage dès que l'interface est prête
    window.addEventListener('DOMContentLoaded', autoRemplirDepuisURL);

    // Envoi des données au serveur FastAPI
    document.getElementById('form-velo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const mode = document.getElementById('action-mode').value;
        const endpoint = mode === 'ajout' ? '/api/ajouter-velo' : '/api/modifier-velo';

        const params = new URLSearchParams();
        params.append('id', document.getElementById('id').value);
        params.append('nom', document.getElementById('nom').value);
        params.append('prix', document.getElementById('prix').value);
        params.append('moteur', document.getElementById('moteur').value);
        params.append('batterie', document.getElementById('batterie').value);
        params.append('description_ia', document.getElementById('description_ia').value);
        params.append('image_url', document.getElementById('image_url').value);
        params.append('marque', document.getElementById('marque').value);
        params.append('modele', document.getElementById('modele').value);
        params.append('robot_token_form', document.getElementById('robot_token_form').value);

        const status = document.getElementById('status');
        status.style.display = "block";
        status.style.background = "#e0f2fe"; status.style.color = "#0369a1";
        status.innerText = "⚡ Synchronisation avec Supabase en cours...";

        try {
            const res = await fetch(endpoint, { method: 'POST', body: params });
            const resData = await res.json();
            
            if(res.ok) {
                status.style.background = "#dcfce7"; status.style.color = "#166534";
                status.innerText = "🎉 " + resData.message;
            } else {
                status.style.background = "#fee2e2"; status.style.color = "#991b1b";
                status.innerText = "❌ Erreur : " + (resData.detail || "Impossible de sauvegarder");
            }
        } catch (err) {
            status.style.background = "#fee2e2"; status.style.color = "#991b1b";
            status.innerText = "❌ Impossible de joindre le serveur de base de données.";
        }
    });
</script>
</body>
</html>
